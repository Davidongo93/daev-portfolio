image: node:20
variables:
  CI: 'true'

stages:
  - test

# Lint, unit-test and build the workspace on a single GitLab runner.
#
# Nx Cloud distributed agents (`nx-cloud start-ci-run --distribute-on`) were
# removed on purpose: this repo is small enough to run everything on one runner,
# and requesting managed agents was failing the pipeline with
# "NX Unable to complete a run ... one or more workflows failed".
#
# `nx run-many` (instead of `nx affected`) avoids shallow-clone edge cases where
# the affected base commit is missing from the fetched history.
CI:
  stage: test
  interruptible: true
  only:
    - main
    - merge_requests
  script:
    - npm ci --legacy-peer-deps
    - npx nx run-many -t lint test build

# GitLab-managed static application security testing (SAST).
sast:
  stage: test
include:
  - template: Security/SAST.gitlab-ci.yml
